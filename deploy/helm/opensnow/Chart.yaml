apiVersion: v2
name: opensnow
description: OpenSnow - Rust-based analytics data warehouse
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - analytics
  - data-warehouse
  - query-engine
  - olap
maintainers:
  - name: OpenSnow Team
home: https://github.com/opensnow/opensnow
sources:
  - https://github.com/opensnow/opensnow
dependencies:
  - name: redis
    version: "19.6.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: "5.0.14"
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: postgresql
    version: "15.5.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    # Optional dependency is disabled by default; OpenSnow uses either metadata.external
    # or its own metadata.builtin StatefulSet so enterprise external-secret renders do not
    # create an unrelated Bitnami PostgreSQL Secret.
