apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opensnow.fullname" . }}-worker
  labels:
    {{- include "opensnow.worker.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "opensnow.fullname" . }}-worker-headless
  replicas: {{ .Values.worker.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "opensnow.worker.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "opensnow.worker.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "opensnow.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "opensnow.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["opensnow"]
          args:
            - "start"
            - "--role"
            - "worker"
            - "--config"
            - "/etc/opensnow/opensnow.toml"
            - "--coordinator"
            - "http://{{ include "opensnow.fullname" . }}-coordinator:{{ .Values.coordinator.ports.grpc }}"
            - "--grpc-port"
            - {{ .Values.worker.ports.grpc | quote }}
          ports:
            - name: grpc
              containerPort: {{ .Values.worker.ports.grpc }}
              protocol: TCP
          env:
            - name: OPENSNOW_ROLE
              value: "worker"
            - name: OPENSNOW_WORKER_GRPC_PORT
              value: {{ .Values.worker.ports.grpc | quote }}
            - name: OPENSNOW_COORDINATOR_SERVICE
              value: "{{ include "opensnow.fullname" . }}-coordinator"
            - name: OPENSNOW_COORDINATOR_GRPC_PORT
              value: {{ .Values.coordinator.ports.grpc | quote }}
            - name: OPENSNOW_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPENSNOW_METADATA_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if and .Values.metadata.external.enabled .Values.metadata.external.existingSecret }}
                  name: {{ .Values.metadata.external.existingSecret }}
                  key: {{ .Values.metadata.external.secretKey }}
                  {{- else }}
                  name: {{ include "opensnow.fullname" . }}-metadata
                  key: password
                  {{- end }}
            - name: OPENSNOW_METADATA_DSN
              value: {{ include "opensnow.metadata.dsn" . | quote }}
            {{- if .Values.redis.enabled }}
            - name: OPENSNOW_REDIS_URL
              value: "redis://{{ include "opensnow.fullname" . }}-redis-master:6379"
            {{- end }}
            {{- if or .Values.config.storage.access_key .Values.config.storage.existingSecret }}
            - name: OPENSNOW_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.config.storage.existingSecret }}
                  name: {{ .Values.config.storage.existingSecret }}
                  key: {{ .Values.config.storage.accessKeySecretKey | default "access-key" }}
                  {{- else }}
                  name: {{ include "opensnow.fullname" . }}-storage
                  key: access-key
                  {{- end }}
            {{- end }}
            {{- if or .Values.config.storage.secret_key .Values.config.storage.existingSecret }}
            - name: OPENSNOW_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.config.storage.existingSecret }}
                  name: {{ .Values.config.storage.existingSecret }}
                  key: {{ .Values.config.storage.secretKeySecretKey | default "secret-key" }}
                  {{- else }}
                  name: {{ include "opensnow.fullname" . }}-storage
                  key: secret-key
                  {{- end }}
            {{- end }}
            {{- if .Values.worker.cache.enabled }}
            - name: OPENSNOW_CACHE_PATH
              value: {{ .Values.worker.cache.mountPath | quote }}
            {{- end }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/opensnow
              readOnly: true
            {{- if .Values.worker.cache.enabled }}
            - name: cache
              mountPath: {{ .Values.worker.cache.mountPath }}
            {{- end }}
          {{- with .Values.worker.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "opensnow.fullname" . }}-config
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.worker.cache.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache
        labels:
          {{- include "opensnow.worker.labels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.worker.cache.storageClass }}
        storageClassName: {{ .Values.worker.cache.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.worker.cache.size }}
  {{- end }}
---
## Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensnow.fullname" . }}-worker-headless
  labels:
    {{- include "opensnow.worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "opensnow.worker.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.worker.ports.grpc }}
      targetPort: grpc
      protocol: TCP
---
## Regular service for load-balanced access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensnow.fullname" . }}-worker
  labels:
    {{- include "opensnow.worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "opensnow.worker.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.worker.ports.grpc }}
      targetPort: grpc
      protocol: TCP
---
{{- if .Values.worker.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "opensnow.fullname" . }}-worker
  labels:
    {{- include "opensnow.worker.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.worker.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "opensnow.worker.selectorLabels" . | nindent 6 }}
{{- end }}
