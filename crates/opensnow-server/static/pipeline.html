<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenSnow — Pipeline</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #0d1117; color: #c9d1d9; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
           border-bottom: 1px solid #21262d; background: #161b22; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .meta { color: #8b949e; font-size: 12px; }
  header .spacer { flex: 1; }
  a.btn, button.btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
        border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; text-decoration: none; }
  a.btn:hover, button.btn:hover { background: #30363d; }
  a.btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .wrap { padding: 18px 20px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #8b949e; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .graph { position: relative; }
  svg.edges { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .cols { position: relative; display: grid; gap: 60px; z-index: 1;
          grid-auto-flow: column; align-items: start; justify-content: start; }
  .col h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
            color: #8b949e; margin: 0 0 12px; }
  .node { width: 210px; margin: 0 0 22px; padding: 10px 12px; border-radius: 8px;
          background: #161b22; border: 1px solid #30363d; border-left-width: 4px; }
  .node .nm { font-weight: 600; font-size: 13px; word-break: break-all; }
  .node .st { font-size: 11px; color: #8b949e; margin-top: 4px; }
  .node.success { border-left-color: #2ea043; }
  .node.error   { border-left-color: #f85149; }
  .node.not_run { border-left-color: #6e7681; }
  .node.source  { border-left-color: #1f6feb; }
  .empty { color: #8b949e; padding: 40px 0; }
  code { background:#21262d; padding:1px 5px; border-radius:4px; font-size:12px; }
  .node .sqlhint { font-size: 11px; color: #1f6feb; margin-top: 6px; }
  /* SQL drawer */
  #drawer { position: fixed; top: 0; right: 0; height: 100%; width: 620px; max-width: 92vw;
            background: #0d1117; border-left: 1px solid #21262d; box-shadow: -8px 0 24px rgba(0,0,0,.4);
            transform: translateX(100%); transition: transform .18s ease; z-index: 20; display: flex; flex-direction: column; }
  #drawer.open { transform: translateX(0); }
  #drawer .dh { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid #21262d; }
  #drawer .dh .nm { font-weight:600; }
  #drawer .dh .sp { flex:1; }
  #drawer .tabs { display:flex; gap:8px; padding:10px 18px 0; }
  #drawer .tab { font-size:12px; color:#8b949e; cursor:pointer; padding:4px 10px; border-radius:6px 6px 0 0; }
  #drawer .tab.active { color:#c9d1d9; background:#161b22; }
  #drawer pre { margin:0; flex:1; overflow:auto; padding:16px 18px; background:#161b22;
                font: 12.5px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; color:#c9d1d9; white-space:pre; }
  #drawer .note { padding:8px 18px; font-size:11px; color:#8b949e; border-top:1px solid #21262d; }
</style>
</head>
<body>
<header>
  <h1>❄ OpenSnow — Pipeline &amp; Lineage</h1>
  <span class="meta" id="meta"></span>
  <span class="spacer"></span>
  <span class="meta" id="runbar"></span>
  <a class="btn" href="/">SQL console</a>
  <a class="btn" id="dash" style="display:none" target="_blank" rel="noopener">Open dashboard ↗</a>
  <button class="btn" id="runbtn" onclick="runPipeline()" style="display:none">▶ Run pipeline</button>
  <button class="btn" onclick="load()">Refresh</button>
</header>
<div class="wrap">
  <div class="legend">
    <span><i class="dot" style="background:#1f6feb"></i> source</span>
    <span><i class="dot" style="background:#2ea043"></i> success</span>
    <span><i class="dot" style="background:#f85149"></i> error</span>
    <span><i class="dot" style="background:#6e7681"></i> not run</span>
  </div>
  <div class="graph">
    <svg class="edges" id="edges"></svg>
    <div class="cols" id="cols"></div>
  </div>
  <div id="empty" class="empty" style="display:none"></div>
</div>
<div id="drawer">
  <div class="dh">
    <span class="nm" id="d-name"></span>
    <span class="st" id="d-meta" style="color:#8b949e;font-size:12px"></span>
    <span class="sp"></span>
    <button class="btn" onclick="closeDrawer()">Close ✕</button>
  </div>
  <div class="tabs">
    <span class="tab active" id="tab-compiled" onclick="setTab('compiled')">Executed SQL (OpenSnow)</span>
    <span class="tab" id="tab-raw" onclick="setTab('raw')">dbt source</span>
  </div>
  <pre id="d-sql"></pre>
  <div class="note">This is the exact SQL OpenSnow runs (wrapped as <code>CREATE TABLE &lt;model&gt; AS &lt;sql&gt;</code>) and executes on its DataFusion engine.</div>
</div>
<script>
const LAYERS = [["source","Sources"],["staging","Staging"],["mart","Marts"],["model","Models"]];

async function load() {
  let data;
  try { data = await (await fetch("/api/v1/pipeline")).json(); }
  catch (e) { return showEmpty("Could not load /api/v1/pipeline."); }

  const meta = document.getElementById("meta");
  meta.textContent = data.generated_at ? ("last run " + new Date(data.generated_at).toLocaleString()) : "";
  updateRunBar(data);
  const dash = document.getElementById("dash");
  if (data.dashboards && data.dashboards.length) {
    dash.style.display = ""; dash.href = data.dashboards[0].url;
    dash.textContent = "Open dashboard: " + data.dashboards[0].name + " ↗";
    dash.classList.add("primary");
  }

  const nodes = data.nodes || [];
  if (!data.available || !nodes.length) {
    return showEmpty("No dbt artifacts found in <code>" + (data.artifacts_dir || "dbt/target") +
      "</code>. Run <code>dbt run</code>, then set <code>OPENSNOW_DBT_ARTIFACTS_DIR</code> to that target dir.");
  }
  document.getElementById("empty").style.display = "none";

  // group by layer, render columns
  const cols = document.getElementById("cols");
  cols.innerHTML = "";
  const idToName = {}; nodes.forEach(n => idToName[n.id] = n.name);
  const elById = {};
  for (const [layer, title] of LAYERS) {
    const group = nodes.filter(n => n.layer === layer);
    if (!group.length) continue;
    const col = document.createElement("div"); col.className = "col";
    col.innerHTML = "<h2>" + title + "</h2>";
    for (const n of group) {
      const d = document.createElement("div");
      d.className = "node " + (n.status || "not_run");
      const t = (n.execution_time != null) ? (" · " + n.execution_time.toFixed(2) + "s") : "";
      const hint = n.sql ? "<div class='sqlhint'>view SQL ›</div>" : "";
      d.innerHTML = "<div class='nm'>" + n.name + "</div><div class='st'>" + n.status + t + "</div>" + hint;
      if (n.sql) { d.style.cursor = "pointer"; d.onclick = () => showSql(n); }
      col.appendChild(d); elById[n.id] = d;
    }
    cols.appendChild(col);
  }

  // draw dependency edges after layout settles
  requestAnimationFrame(() => drawEdges(nodes, elById));
}

function drawEdges(nodes, elById) {
  const svg = document.getElementById("edges");
  const graph = svg.parentElement.getBoundingClientRect();
  svg.setAttribute("width", graph.width); svg.setAttribute("height", graph.height);
  svg.innerHTML = "";
  for (const n of nodes) {
    const to = elById[n.id]; if (!to) continue;
    for (const dep of (n.depends_on || [])) {
      const from = elById[dep]; if (!from) continue;
      const a = from.getBoundingClientRect(), b = to.getBoundingClientRect();
      const x1 = a.right - graph.left, y1 = a.top - graph.top + a.height/2;
      const x2 = b.left - graph.left,  y2 = b.top - graph.top + b.height/2;
      const mx = (x1 + x2) / 2;
      const p = document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d", `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
      p.setAttribute("fill","none"); p.setAttribute("stroke","#30363d"); p.setAttribute("stroke-width","1.5");
      svg.appendChild(p);
    }
  }
}

let polling = null;
function updateRunBar(data) {
  const btn = document.getElementById("runbtn");
  const bar = document.getElementById("runbar");
  const run = data.run || {};
  btn.style.display = data.runnable ? "" : "none";
  btn.disabled = !!run.running;
  btn.textContent = run.running ? "● Running…" : "▶ Run pipeline";
  let parts = [];
  if (run.running) parts.push("running…");
  else if (run.last_success === true) parts.push("✓ last run ok");
  else if (run.last_success === false) parts.push("✗ last run failed");
  if (run.next_run && !run.running) parts.push("next " + new Date(run.next_run).toLocaleTimeString());
  if (run.schedule) parts.push(run.schedule);
  bar.textContent = parts.join("  ·  ");
  // poll while a run is in flight so the graph refreshes on completion
  if (run.running && !polling) polling = setInterval(load, 2000);
  if (!run.running && polling) { clearInterval(polling); polling = null; }
}

async function runPipeline() {
  const btn = document.getElementById("runbtn");
  btn.disabled = true; btn.textContent = "● Running…";
  try { await fetch("/api/v1/pipeline/run", { method: "POST" }); } catch (e) {}
  setTimeout(load, 600);
}

let drawerNode = null, drawerTab = 'compiled';
function showSql(n) {
  drawerNode = n;
  document.getElementById("d-name").textContent = n.name;
  const t = (n.execution_time != null) ? (n.execution_time.toFixed(2) + "s") : "";
  document.getElementById("d-meta").textContent = [n.layer, n.status, t].filter(Boolean).join("  ·  ");
  setTab('compiled');
  document.getElementById("drawer").classList.add("open");
}
function setTab(which) {
  drawerTab = which;
  document.getElementById("tab-compiled").classList.toggle("active", which === 'compiled');
  document.getElementById("tab-raw").classList.toggle("active", which === 'raw');
  const sql = which === 'compiled' ? (drawerNode.sql || '') : (drawerNode.raw_sql || '');
  document.getElementById("d-sql").textContent = sql.trim() || "(no SQL captured)";
}
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

function showEmpty(html){
  document.getElementById("cols").innerHTML = "";
  document.getElementById("edges").innerHTML = "";
  const e = document.getElementById("empty"); e.style.display = ""; e.innerHTML = html;
}

window.addEventListener("resize", load);
load();
</script>
</body>
</html>
