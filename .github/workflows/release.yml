name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  # Container image signing + container SBOM/attestation use cosign keyless
  # (Sigstore OIDC) and push artifacts to the registry. They require:
  #   * `id-token: write` (granted above) so the runner can mint an OIDC token,
  #   * write access to the target registry (ghcr.io, via GITHUB_TOKEN).
  # On forks or self-hosted runners without Sigstore/registry access these will
  # not work; set ENABLE_IMAGE_SIGNING to "false" to skip them cleanly instead
  # of failing the release. The unsigned image is still built and pushed.
  ENABLE_IMAGE_SIGNING: "true"

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: opensnow-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: opensnow-aarch64-linux
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: opensnow-x86_64-macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: opensnow-aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-cargo-

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            tar czf ${{ matrix.artifact }}.tar.gz opensnow
          else
            tar czf ${{ matrix.artifact }}.tar.gz opensnow
          fi
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz.sha256
          retention-days: 5

  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push multi-arch Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Supply-chain provenance for the container image (CC8.1) ---
      # Each step below is gated on ENABLE_IMAGE_SIGNING so a fork/self-hosted
      # runner without Sigstore/registry access can skip signing without
      # breaking the release (the image itself is already built + pushed above).
      - name: Install cosign
        if: env.ENABLE_IMAGE_SIGNING == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Install syft (container SBOM)
        if: env.ENABLE_IMAGE_SIGNING == 'true'
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate container SBOM (CycloneDX) and sign + attest image
        if: env.ENABLE_IMAGE_SIGNING == 'true'
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          REF="${IMAGE}@${DIGEST}"
          echo "Generating container SBOM for ${REF}"
          # Full-image SBOM (OS packages + Rust deps), complementing the
          # source-only cargo-cyclonedx SBOM produced by the `sbom` job.
          syft "${REF}" -o cyclonedx-json > container-sbom.cyclonedx.json
          echo "Keyless-signing image ${REF}"
          # Keyless signature via the GitHub OIDC identity (Sigstore Fulcio /
          # Rekor). The signature is stored alongside the image in the registry.
          cosign sign --recursive "${REF}"
          echo "Attaching SBOM as a signed in-toto attestation"
          cosign attest --recursive \
            --predicate container-sbom.cyclonedx.json \
            --type cyclonedx \
            "${REF}"

      - name: Upload container SBOM artifact
        if: env.ENABLE_IMAGE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: container-sbom-cyclonedx
          path: container-sbom.cyclonedx.json
          retention-days: 90

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --format json --output-pattern bom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/bom.json"
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, sbom]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.sha256' -exec cp {} release-assets/ \;
          find artifacts -name 'bom.json' -exec cp {} release-assets/sbom-cyclonedx.json \;
          # Container-image SBOM (present only when image signing was enabled).
          find artifacts -name 'container-sbom.cyclonedx.json' \
            -exec cp {} release-assets/container-sbom-cyclonedx.json \; || true

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "body=Initial release" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
            {
              echo "body<<CHANGELOG_EOF"
              echo "$CHANGELOG"
              echo "CHANGELOG_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Changes
            ${{ steps.changelog.outputs.body }}

            ## Checksums
            See the `.sha256` files for each binary.

            ## SBOM
            A source CycloneDX SBOM is attached as `sbom-cyclonedx.json`, and a
            full container-image SBOM as `container-sbom-cyclonedx.json` (when
            image signing is enabled).

            ## Image signing
            Container images are signed keylessly with cosign (Sigstore) and
            carry a signed CycloneDX SBOM attestation. Verify with:
            ```
            cosign verify ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
