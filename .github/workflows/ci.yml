name: CI

# Pre-public: CI is run locally, so it does NOT auto-run on every push (that
# burns org Actions minutes on a private repo). It runs only on pull requests
# to main, or manually via the Actions tab. Re-add the `push:` trigger before
# going public (Actions is free on public repos).
on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ebd-ci
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        # macOS runners bill at 10x minutes; keep CI to ubuntu pre-public.
        os: [ebd-ci]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

      - name: Install quickstart smoke dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Quickstart smoke (local)
        if: matrix.os == 'ubuntu-latest'
        run: scripts/quickstart-smoke.sh --mode local

  build:
    name: Build (release)
    runs-on: ebd-ci
    timeout-minutes: 35
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensnow-linux-x86_64
          path: target/release/opensnow
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ebd-ci
    timeout-minutes: 35
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dep-check:
    name: Dependency Health
    runs-on: ebd-ci
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deps-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-cargo-

      - name: Install dep tools
        run: |
          cargo install cargo-machete --quiet
          cargo install cargo-audit --quiet

      - name: Check for duplicate crates
        # Fails CI if any NEW duplicate appears that isn't in the known list
        run: |
          DUPES=$(cargo tree --duplicates 2>/dev/null \
            | grep -v "Downloading\|Downloaded\|Compiling\|Locking" \
            | grep -E "^[a-z]" | grep -v "^\s" | sort -u || true)

          # Known/accepted duplicates — transitive, controlled by Arrow/DataFusion ecosystem.
          # num-traits/ordered-float come from arrow; phf/phf_shared/webpki-roots from ureq/rustls.
          KNOWN="axum tower bitflags hashbrown rand rand_core rand_chacha getrandom \
                 thiserror thiserror-impl indexmap itertools fallible-iterator \
                 serde_json serde_core prost prost-types tonic axum-core \
                 chrono matchit socket2 log twox-hash untrusted tokio \
                 petgraph datafusion-common datafusion-expr \
                 num-traits ordered-float phf phf_shared webpki-roots"

          FAIL=0
          while IFS= read -r line; do
            crate=$(echo "$line" | cut -d' ' -f1)
            if ! echo "$KNOWN" | grep -qw "$crate"; then
              echo "::error::New duplicate crate: $line"
              FAIL=1
            else
              echo "::notice::Known duplicate (accepted): $line"
            fi
          done <<< "$DUPES"
          exit $FAIL

      - name: Check for unused dependencies
        run: cargo machete
        continue-on-error: true   # warn only, don't block merge

      - name: Security audit (blocking)
        # SOC 2 CC6.8/CC7.1: known-vulnerable dependencies must block merge.
        # Scoped ignores below are transitive advisories with no upstream fix yet
        # (protobuf was removed by dropping prometheus' protobuf feature). Revisit
        # and drop these as fixes land:
        #   RUSTSEC-2023-0071  rsa            Marvin timing sidechannel — no fixed upgrade
        #   RUSTSEC-2024-0384  instant        unmaintained (transitive)
        #   RUSTSEC-2024-0436  paste          unmaintained (transitive)
        #   RUSTSEC-2025-0134  rustls-pemfile unmaintained (transitive)
        #   RUSTSEC-2026-0097  rand           unsound only with a custom logger (edge case)
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0097

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ebd-ci
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan past commits, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        # SOC 2 CC6.8/CC7.1 supply-chain: fail the build if a secret is detected
        # in the working tree or git history. Uses the OSS gitleaks binary directly
        # (the gitleaks-action requires a paid license for org repos); same scan,
        # no license needed.
        run: |
          GL_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1

  helm-lint:
    name: Helm Lint
    runs-on: ebd-ci
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint deploy/helm/opensnow/

      - name: Template Helm chart (dry-run validation)
        run: helm template opensnow deploy/helm/opensnow/ --debug
