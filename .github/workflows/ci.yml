name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

      - name: Install quickstart smoke dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Quickstart smoke (local)
        if: matrix.os == 'ubuntu-latest'
        run: scripts/quickstart-smoke.sh --mode local

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensnow-linux-x86_64
          path: target/release/opensnow
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dep-check:
    name: Dependency Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deps-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-cargo-

      - name: Install dep tools
        run: |
          cargo install cargo-machete --quiet
          cargo install cargo-audit --quiet

      - name: Check for duplicate crates
        # Fails CI if any NEW duplicate appears that isn't in the known list
        run: |
          DUPES=$(cargo tree --duplicates 2>/dev/null \
            | grep -v "Downloading\|Downloaded\|Compiling\|Locking" \
            | grep -E "^[a-z]" | grep -v "^\s" | sort -u || true)

          # Known/accepted duplicates — transitive, controlled by Arrow/DataFusion ecosystem
          KNOWN="axum tower bitflags hashbrown rand rand_core rand_chacha getrandom \
                 thiserror thiserror-impl indexmap itertools fallible-iterator \
                 serde_json serde_core prost prost-types tonic axum-core \
                 chrono matchit socket2 log twox-hash untrusted tokio \
                 petgraph datafusion-common datafusion-expr"

          FAIL=0
          while IFS= read -r line; do
            crate=$(echo "$line" | cut -d' ' -f1)
            if ! echo "$KNOWN" | grep -qw "$crate"; then
              echo "::error::New duplicate crate: $line"
              FAIL=1
            else
              echo "::notice::Known duplicate (accepted): $line"
            fi
          done <<< "$DUPES"
          exit $FAIL

      - name: Check for unused dependencies
        run: cargo machete
        continue-on-error: true   # warn only, don't block merge

      - name: Security audit (blocking)
        # SOC 2 CC6.8/CC7.1: known-vulnerable dependencies must block merge.
        # If a specific advisory is genuinely unfixable upstream, document it and
        # add a scoped `--ignore RUSTSEC-XXXX-NNNN` here rather than reverting to
        # warn-only for all advisories.
        run: cargo audit --deny warnings

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan past commits, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        # SOC 2 CC6.8/CC7.1 supply-chain: fail the build if a secret is detected
        # in the working tree or git history.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint deploy/helm/opensnow/

      - name: Template Helm chart (dry-run validation)
        run: helm template opensnow deploy/helm/opensnow/ --debug
